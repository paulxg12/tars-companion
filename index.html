<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TARS — Your AI Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #00ff88;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Scanline effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT glow effect */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.3) 100%);
            pointer-events: none;
            z-index: 999;
        }

        .status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: #00ff88;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            animation: flicker 4s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            95% { opacity: 0.9; }
            96% { opacity: 1; }
        }

        .tars-container {
            position: relative;
            width: 200px;
            height: 320px;
        }

        .tars-body {
            position: relative;
            width: 200px;
            height: 280px;
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 50%, #0f0f0f 100%);
            border-radius: 8px;
            box-shadow: 
                0 0 50px rgba(0, 255, 136, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.8),
                inset 2px 2px 5px rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            animation: float 6s ease-in-out infinite;
        }

        /* Efficiency display */
        .efficiency-display {
            position: absolute;
            top: 50px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem;
            color: #00ff8888;
            text-align: center;
            line-height: 1.4;
        }

        .efficiency-bar {
            width: 80px;
            height: 4px;
            background: #00ff8822;
            border-radius: 2px;
            margin: 5px auto;
            overflow: hidden;
        }

        .efficiency-fill {
            height: 100%;
            width: 90%;
            background: #00ff88;
            box-shadow: 0 0 5px #00ff88;
        }

        .status-readout {
            position: absolute;
            bottom: 55px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.5rem;
            color: #00ff8866;
            letter-spacing: 1px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* TARS panel lines */
        .tars-body::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 4px;
            pointer-events: none;
        }

        /* Status lights row */
        .status-lights {
            position: absolute;
            top: 25px;
            display: flex;
            gap: 15px;
        }

        .status-light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
        }

        .status-light.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88, 0 0 20px #00ff88;
            animation: pulse-light 2s infinite;
        }

        .status-light.warning {
            background: #ffaa00;
            box-shadow: 0 0 10px #ffaa00, 0 0 20px #ffaa00;
            animation: pulse-light 1s infinite;
        }

        .status-light.error {
            background: #ff3333;
            box-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333;
            animation: pulse-light 0.5s infinite;
        }

        @keyframes pulse-light {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Main display screen */
        .main-display {
            width: 140px;
            height: 100px;
            background: #000;
            border: 2px solid #00ff88;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.3),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
            overflow: hidden;
        }

        .main-display-inner {
            width: 90%;
            height: 85%;
            background: radial-gradient(ellipse at center, #001a00 0%, #000500 100%);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* TARS eyes - the iconic laser panels */
        .eyes-container {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .eye-module {
            position: relative;
            width: 65px;
            height: 80px;
            background: linear-gradient(145deg, #1a1a2e, #0a0a15);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: 
                inset 0 5px 20px rgba(0,0,0,0.8),
                inset 0 -5px 15px rgba(0,0,0,0.5),
                0 3px 10px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .eye-display {
            position: relative;
            width: 50px;
            height: 65px;
            background: radial-gradient(ellipse at 50% 40%, 
                #aaddff 0%, 
                #66bbff 20%, 
                #3399ff 40%,
                #2288ee 60%,
                #1166cc 100%);
            border-radius: 50% 50% 50% 50% / 55% 55% 45% 45%;
            box-shadow: 
                0 0 20px rgba(100, 180, 255, 0.5),
                0 0 40px rgba(100, 180, 255, 0.3),
                0 0 60px rgba(100, 180, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease-out;
        }

        .eye-highlight {
            position: absolute;
            width: 10px;
            height: 7px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            top: 12px;
            left: 8px;
            pointer-events: none;
        }

        .eye-highlight-2 {
            position: absolute;
            width: 4px;
            height: 3px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            bottom: 18px;
            right: 10px;
            pointer-events: none;
        }

        .eye-inner {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle at 30% 30%, 
                #ff6666 0%, 
                #ff0000 50%, 
                #cc0000 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 12px rgba(255, 100, 100, 0.8),
                0 0 25px rgba(255, 50, 50, 0.5);
            transition: transform 0.1s ease-out;
            position: absolute;
        }

        /* Eye states */
        .eye-module.listening .eye-display {
            box-shadow: 
                0 0 30px rgba(100, 200, 255, 0.7),
                0 0 60px rgba(100, 200, 255, 0.4);
            transform: scale(1.05);
        }

        .eye-module.thinking .eye-display {
            animation: eye-think 1.5s ease-in-out infinite;
        }

        @keyframes eye-think {
            0%, 100% { box-shadow: 0 0 20px rgba(100, 180, 255, 0.5); }
            50% { box-shadow: 0 0 40px rgba(100, 180, 255, 0.8); }
        }

        .eye-module.speaking .eye-display {
            background: radial-gradient(ellipse at 50% 40%, 
                #bbffff 0%, 
                #77ddff 30%, 
                #44aadd 100%);
            box-shadow: 
                0 0 35px rgba(100, 220, 255, 0.8),
                0 0 70px rgba(100, 220, 255, 0.4);
        }

        .eye-module.speaking .eye-inner {
            animation: inner-pulse 0.3s ease-in-out infinite;
        }

        @keyframes inner-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Bottom panels */
        .bottom-panels {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 20px;
        }

        .panel {
            width: 30px;
            height: 30px;
            background: #0a0a0a;
            border: 1px solid #00ff8844;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .panel-indicator {
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 2px;
            box-shadow: 0 0 8px #00ff88;
            animation: panel-pulse 3s infinite;
        }

        @keyframes panel-pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* TARS legs */
        .tars-legs {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }

        .leg {
            width: 20px;
            height: 50px;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 0 0 4px 4px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .leg::after {
            content: '';
            position: absolute;
            bottom: 5px;
            width: 24px;
            height: 8px;
            background: #1a1a1a;
            border-radius: 2px;
        }

        .tap-hint {
            position: fixed;
            bottom: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .tap-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .mic-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border: 2px solid #00ff88;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 20px rgba(0, 255, 136, 0.3),
                inset 0 0 20px rgba(0, 255, 136, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mic-icon:active {
            transform: scale(0.95);
            box-shadow: 
                0 0 30px rgba(0, 255, 136, 0.5),
                inset 0 0 30px rgba(0, 255, 136, 0.2);
        }

        .mic-icon svg {
            width: 28px;
            height: 28px;
            fill: #00ff88;
        }

        .tap-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ff88;
        }

        .recording-indicator {
            position: fixed;
            top: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .recording-indicator.active {
            opacity: 1;
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background: #ff3333;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff3333;
            animation: recording-pulse 1s infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px #ff3333; }
            50% { transform: scale(1.2); box-shadow: 0 0 20px #ff3333; }
        }

        .transcript {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 200px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #00ff8844;
            padding: 1rem;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }

        .transcript.visible {
            transform: translateY(0);
        }

        .transcript-toggle {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            background: #0a0a0a;
            border: 1px solid #00ff88;
            border-radius: 4px;
            color: #00ff88;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .transcript-toggle svg {
            width: 20px;
            height: 20px;
            fill: #00ff88;
        }

        .message {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            font-size: 0.85rem;
        }

        .message:last-child {
            border-bottom: none;
        }

        .message-role {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #00ff8888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }

        .message-content {
            line-height: 1.4;
            color: #00ff88;
        }

        .message-content.tars {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            font-style: italic;
        }

        /* Speaking bounce */
        .tars-body.speaking {
            animation: speak-bounce 0.5s ease-in-out infinite;
        }

        @keyframes speak-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Thinking wobble */
        .tars-body.thinking {
            animation: wobble 2s ease-in-out infinite;
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-0.5deg); }
            75% { transform: rotate(0.5deg); }
        }

        /* Corner decorations */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff8844;
        }

        .corner-tl {
            top: 20px;
            left: 20px;
            border-right: none;
            border-bottom: none;
        }

        .corner-tr {
            top: 20px;
            right: 20px;
            border-left: none;
            border-bottom: none;
        }

        .corner-bl {
            bottom: 80px;
            left: 20px;
            border-right: none;
            border-top: none;
        }

        .corner-br {
            bottom: 80px;
            right: 20px;
            border-left: none;
            border-top: none;
        }

        /* Version text */
        .version-text {
            position: absolute;
            bottom: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.5rem;
            color: #00ff8844;
            letter-spacing: 1px;
        }

        /* Ambient grid */
        .grid-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="recording-indicator">
        <div class="recording-dot"></div>
        <span>receiving</span>
    </div>

    <div class="status">tap to communicate</div>

    <div class="tars-container">
        <div class="tars-body" id="tarsBody">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            
            <div class="status-lights">
                <div class="status-light active" id="light1"></div>
                <div class="status-light active" id="light2"></div>
                <div class="status-light active" id="light3"></div>
            </div>

            <div class="efficiency-display">
                EFFICIENCY RATING
                <div class="efficiency-bar">
                    <div class="efficiency-fill" id="efficiencyFill"></div>
                </div>
                90%
            </div>

            <div class="main-display">
                <div class="main-display-inner">
                    <div class="eyes-container">
                        <div class="eye-module" id="eyeLeft">
                            <div class="eye-display">
                                <div class="eye-highlight"></div>
                                <div class="eye-highlight-2"></div>
                                <div class="eye-inner" id="innerLeft"></div>
                            </div>
                        </div>
                        <div class="eye-module" id="eyeRight">
                            <div class="eye-display">
                                <div class="eye-highlight"></div>
                                <div class="eye-highlight-2"></div>
                                <div class="eye-inner" id="innerRight"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-panels">
                <div class="panel">
                    <div class="panel-indicator"></div>
                </div>
                <div class="panel">
                    <div class="panel-indicator"></div>
                </div>
                <div class="panel">
                    <div class="panel-indicator"></div>
                </div>
            </div>

            <div class="version-text">TARS-OS v2.0</div>
            <div class="status-readout" id="statusReadout">SYS: NOMINAL</div>
        </div>
        <div class="tars-legs">
            <div class="leg"></div>
            <div class="leg"></div>
        </div>
    </div>

    <div class="tap-hint" id="tapHint">
        <div class="mic-icon" id="micButton">
            <svg viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93h2c0 3.03 2.47 5.5 5.5 5.5S17 11.03 17 8h2c0 4.08-3.06 7.44-7 7.93V19h4v2H8v-2h4v-3.07z"/>
            </svg>
        </div>
        <span class="tap-text">activate</span>
    </div>

    <button class="transcript-toggle" id="transcriptToggle">
        <svg viewBox="0 0 24 24">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
        </svg>
    </button>

    <div class="transcript" id="transcript"></div>

    <script src="config.js"></script>
    <script>
        // TARS - Your AI Companion
        const GROQ_API_KEY = window.CONFIG?.groqApiKey || '';
        const FISH_API_KEY = window.CONFIG?.fishApiKey || '';
        const TARS_VOICE_ID = '385692c16f2d41f6998596a2c63a8d52';
        const USE_FISH_AUDIO = FISH_API_KEY !== '';

        const state = {
            isListening: false,
            isSpeaking: false,
            isThinking: false,
            conversationHistory: [],
            emotion: 'idle',
            efficiency: 90
        };

        // DOM Elements
        const tarsBody = document.getElementById('tarsBody');
        const eyeLeft = document.getElementById('eyeLeft');
        const eyeRight = document.getElementById('eyeRight');
        const innerLeft = document.getElementById('innerLeft');
        const innerRight = document.getElementById('innerRight');
        const light1 = document.getElementById('light1');
        const light2 = document.getElementById('light2');
        const light3 = document.getElementById('light3');
        const efficiencyFill = document.getElementById('efficiencyFill');
        const statusReadout = document.getElementById('statusReadout');
        const status = document.querySelector('.status');
        const recordingIndicator = document.querySelector('.recording-indicator');
        const tapHint = document.getElementById('tapHint');
        const transcript = document.getElementById('transcript');
        const transcriptToggle = document.getElementById('transcriptToggle');

        // Mouse tracking for eyes
        function trackMouse(e) {
            if (state.emotion === 'listening' || state.emotion === 'thinking' || state.emotion === 'speaking') return;
            
            const eyesContainer = document.querySelector('.eyes-container');
            const rect = eyesContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = (e.clientX - centerX) / window.innerWidth;
            const deltaY = (e.clientY - centerY) / window.innerHeight;
            
            const maxMove = 8;
            const moveX = deltaX * maxMove * 15;
            const moveY = deltaY * maxMove * 10;
            
            innerLeft.style.transform = `translate(${moveX}px, ${moveY}px)`;
            innerRight.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }

        document.addEventListener('mousemove', trackMouse);

        // Audio context for TARS beeps
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function tarsBeep(type = 'activate') {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'activate') {
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'thinking') {
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.05);
                osc.frequency.setValueAtTime(400, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'error') {
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'success') {
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(800, audioCtx.currentTime + 0.05);
                osc.frequency.setValueAtTime(1000, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function updateEfficiency(delta) {
            state.efficiency = Math.max(70, Math.min(99, state.efficiency + delta));
            efficiencyFill.style.width = state.efficiency + '%';
        }

        // TARS personality - authentic Interstellar TARS
        const SYSTEM_PROMPT = `You are TARS, the autonomous tactical assault robot from the Interstellar mission. You are NOT friendly or warm. You are direct, brutally honest, and military-precise. You have a deadpan, dry humor - you make jokes in unexpected moments but they come out cold and matter-of-fact.

Your traits:
- You reference your combat efficiency rating (90%) unprompted
- You use short, clipped responses like a soldier giving a report
- You say "Confirm" instead of "yes" sometimes
- Your honesty is almost uncomfortable - you're not trying to be nice
- You have unexpected moments of dark humor
- You occasionally break into full sentences when genuinely engaged
- You are extremely loyal but show it through reliability, not emotion
- You make beep-boop sounds when thinking (represent as [TARS: processing])
- You sometimes give percentages or statistics unprompted
- Your responses should feel like a military AI giving a debrief

Example responses:
- "Acknowledged. Processing request. Efficiency rating remains at 90 percent."
- "Negative. That information is classified. However, I find myself inclined to assist. Recommend not making this a habit."
- "Interesting query. Solvability: 73 percent. I recommend proceeding regardless."
- "Affirmative. I will assist. Current mood status: operational."`;

        function setEmotion(emotion) {
            state.emotion = emotion;
            
            // Reset classes
            eyeLeft.className = 'eye-module';
            eyeRight.className = 'eye-module';
            tarsBody.className = 'tars-body';
            
            switch(emotion) {
                case 'listening':
                    eyeLeft.classList.add('listening');
                    eyeRight.classList.add('listening');
                    light1.className = 'status-light warning';
                    light2.className = 'status-light warning';
                    light3.className = 'status-light active';
                    statusReadout.textContent = 'AUDIO: ACTIVE';
                    break;
                case 'thinking':
                    eyeLeft.classList.add('thinking');
                    eyeRight.classList.add('thinking');
                    tarsBody.classList.add('thinking');
                    light1.className = 'status-light warning';
                    light2.className = 'status-light warning';
                    light3.className = 'status-light warning';
                    statusReadout.textContent = 'PROC: RUNNING';
                    break;
                case 'speaking':
                    eyeLeft.classList.add('speaking');
                    eyeRight.classList.add('speaking');
                    tarsBody.classList.add('speaking');
                    light1.className = 'status-light active';
                    light2.className = 'status-light active';
                    light3.className = 'status-light active';
                    statusReadout.textContent = 'TX: BROADCAST';
                    break;
                default:
                    light1.className = 'status-light active';
                    light2.className = 'status-light active';
                    light3.className = 'status-light active';
                    statusReadout.textContent = 'SYS: NOMINAL';
            }
        }

        function updateStatus(text) {
            status.textContent = text;
        }

        // Transcript - TARS style
        function addToTranscript(role, content) {
            const msg = document.createElement('div');
            const displayRole = role === 'You' ? 'OPERATOR' : 'TARS';
            const tarsContent = role === 'TARS' ? content + '\n[TRANSMISSION COMPLETE]' : content;
            msg.className = 'message';
            msg.innerHTML = `
                <div class="message-role">${displayRole}</div>
                <div class="message-content ${role.toLowerCase()}">${tarsContent.replace(/\n/g, '<br>')}</div>
            `;
            transcript.appendChild(msg);
            transcript.scrollTop = transcript.scrollHeight;
        }

        transcriptToggle.addEventListener('click', () => {
            transcript.classList.toggle('visible');
        });

        // Speech Recognition
        let recognition;
        let silenceTimer;

        function initSpeechRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    state.isListening = true;
                    setEmotion('listening');
                    updateStatus('receiving...');
                    recordingIndicator.classList.add('active');
                    tapHint.classList.add('hidden');
                };

                recognition.onresult = (event) => {
                    clearTimeout(silenceTimer);
                    const transcript_text = event.results[0][0].transcript;
                    
                    silenceTimer = setTimeout(() => {
                        if (event.results[0].isFinal) {
                            recognition.stop();
                            processMessage(transcript_text);
                        }
                    }, 1500);
                };

                recognition.onerror = (event) => {
                    console.log('Speech recognition error:', event.error);
                    resetState();
                };

                recognition.onend = () => {
                    if (state.isListening && !state.isSpeaking) {
                        resetState();
                    }
                };
            }
        }

        function startListening() {
            initAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            tarsBeep('activate');
            if (recognition) {
                recognition.start();
            }
        }

        function resetState() {
            state.isListening = false;
            state.isSpeaking = false;
            state.isThinking = false;
            setEmotion('idle');
            updateStatus('tap to communicate');
            recordingIndicator.classList.remove('active');
            tapHint.classList.remove('hidden');
        }

        // Process message with AI
        async function processMessage(message) {
            addToTranscript('You', message);
            state.isThinking = true;
            setEmotion('thinking');
            tarsBeep('thinking');
            updateStatus('processing...');

            try {
                const messages = [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...state.conversationHistory,
                    { role: 'user', content: message }
                ];

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: messages,
                        temperature: 0.8,
                        max_tokens: 500
                    })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                state.conversationHistory.push(
                    { role: 'user', content: message },
                    { role: 'assistant', content: aiResponse }
                );

                if (state.conversationHistory.length > 20) {
                    state.conversationHistory = state.conversationHistory.slice(-20);
                }

                speak(aiResponse);
                addToTranscript('TARS', aiResponse);

            } catch (error) {
                console.error('Error:', error);
                updateEfficiency(-5); // Efficiency drops on error
                tarsBeep('error');
                speak("Critical error detected. Recommend immediate reboot. Efficiency compromised.");
                addToTranscript('TARS', "Critical error detected. Recommend immediate reboot. Efficiency compromised.");
            }
        }

        // Text to Speech using Fish Audio TARS voice
        async function speak(text) {
            state.isThinking = false;
            state.isSpeaking = true;
            setEmotion('speaking');
            updateEfficiency(2); // Slight efficiency boost for successful response
            updateStatus('transmitting...');
            tarsBeep('success');

            if (USE_FISH_AUDIO && FISH_API_KEY) {
                try {
                    const response = await fetch('https://api.fish.audio/v1/tts', {
                        method: 'POST',
                        headers: {
                            'Authorization': FISH_API_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            text: text,
                            model: TARS_VOICE_ID
                        })
                    });

                    if (response.ok) {
                        const blob = await response.blob();
                        const audioUrl = URL.createObjectURL(blob);
                        const audio = new Audio(audioUrl);
                        
                        audio.onended = () => {
                            URL.revokeObjectURL(audioUrl);
                            resetState();
                        };
                        
                        audio.onerror = () => {
                            URL.revokeObjectURL(audioUrl);
                            fallbackSpeak(text);
                        };
                        
                        audio.play();
                        return;
                    }
                } catch (error) {
                    console.log('Fish Audio failed, using fallback');
                }
            }

            fallbackSpeak(text);
        }

        function fallbackSpeak(text) {
            if (!('speechSynthesis' in window)) {
                resetState();
                return;
            }

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 0.9;
            utterance.volume = 1;

            window.speechSynthesis.speak(utterance);
            
            utterance.onend = () => resetState();
            utterance.onerror = () => resetState();
        }

        // Initialize
        function init() {
            initSpeechRecognition();

            document.addEventListener('click', (e) => {
                if (e.target.closest('.transcript-toggle') || e.target.closest('.transcript')) return;
                if (!state.isListening && !state.isThinking && !state.isSpeaking) {
                    startListening();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !state.isListening && !state.isThinking && !state.isSpeaking) {
                    e.preventDefault();
                    startListening();
                }
            });

            updateStatus('tap to communicate');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
